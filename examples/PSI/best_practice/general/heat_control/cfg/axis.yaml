axis:
  id: ${AX_ID=1}
  autoEnable:
    enableTimeout: 2

epics:
  name: ${AX_NAME=Axis1}
  precision: 3
  unit: degC
  motorRecord:
    enable: true
    description: Heat controller
    fieldInit: "RTRY=0,FOFF=Frozen"

drive:
  numerator: 0.01
  denominator: 32768
  type: 0
  control: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Ctrl
  status: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Stat
  setpoint: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Outp
  enable: 5
  reset: 6
  enabled: 4
  warning: 5
  error:
    - 6

encoder:
  type: 1
  position: ec0.s$(ENC_ID).analogInput01
  numerator: 1
  denominator: 1
  bits: 32
  absBits: 32
  absOffset: 0

controller:
  Kp: 3
  Ki: 0.005
  Kd: 0.01
  Kff: 1
  deadband:
    tol: 0
    time: 100
  limits:
    minOutput: 0                             # Important for heaters: do not allow negative output
    maxOutput: 0.01
    minIntegral: 0
    maxIntegral: 0.01

trajectory:
  source: 0
  type: 1
  axis:
    velocity: 0.01
    acceleration: 0.01
    deceleration: 0.01

input:
  limit:
    forward: ec0.s$(DRV_ID).ONE.1
    backward: ec0.s$(DRV_ID).ONE.0
  home: ec0.s$(DRV_ID).ONE.0
  interlock: ec0.s$(DRV_ID).ONE.0

softlimits:
  enable: no
  backwardEnable: yes
  forwardEnable: yes
  forward: 10
  backward: -10

monitoring:
  lag:
    enable: no
    tolerance: 0.1
    time: 100
  target:
    enable: yes
    tolerance: 0.01
    time: 100
  velocity:
    enable: no
    max: 50
    time:
      trajectory: 100
      drive: 200
  stall:
    enable: no
