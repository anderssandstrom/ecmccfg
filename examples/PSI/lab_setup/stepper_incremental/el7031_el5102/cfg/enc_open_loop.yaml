encoder:
  desc: Open loop
  unit: mm
  numerator: 1                                        # Scaling numerator
  denominator: 12800                                  # 200 fullsteps * 64 microsteps per mm
  type: 0                                             # Type: 0=Incremental, 1=Absolute
  bits: 16                                            # Total bit count of encoder raw data
  absBits: 0                                          # Absolute bit count
  absOffset: 0                                        # Encoder offset
  position: ec0.s$(DRV_SID).positionActual01          # EL7047 internal microstep counter
  homing:
    refToEncIDAtStartup: 1                            # Ref open-loop encoder to encoder 1 at startup
    refAtHome: 1                                      # Ref open-loop encoder when homing completes
