axis:
  id: ${AX_ID=1}
  autoEnable:
    enableTimeout: 2

epics:
  name: ${AX_NAME=Axis1}
  precision: 3
  unit: deqC
  motorRecord:
    enable: true
    description: ""
    fieldInit: "RTRY=0,FOFF=Frozen"

drive:
  numerator: 0.01                    # deq/s, Max speed is 8000 rev/sec for drive with 6 pole motor
  denominator: 32768
  type: 0                            # Stepper: 0, DS402: 1 (servos)
  control: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Ctrl
  status: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Stat
  setpoint: ec0.s$(DRV_ID).PWM${DRV_CH=01}_Outp  
  enable: 5                                  # Enable bit index in control word (not used if DS402)
  reset: 6       # This is actuallu ready-bit, no enabled bit in status word
  enabled: 4                                 # Enabled bit index in status word (not used if DS402)  
  warning: 5                                 # Warning bit in status word (if no drive warning bit then leave empty)
  error:                                     # max 3 error bits in status word
    - 6                                      # Error 0 (if no drive error bit then leave empty)

encoder:
  type: 1
  position: ec0.s$(ENC_ID).analogInput01
  numerator: 1
  denominator: 100
  bits: 32
  absBits: 32
  absOffset: 0

controller:
  Kp: 1
  Ki: 0.0000001
  Kd: 0.0
  deadband:
    tol: 0
    time: 1

trajectory:
  source: 0
  type: 1
  axis:
    velocity: 0.01
    acceleration: 0.01
    deceleration: 0.01

input:
  limit:
    forward: ec0.s$(DRV_ID).ONE.1
    backward: ec0.s$(DRV_ID).ONE.0
  home: ec0.s$(DRV_ID).ONE.0
  interlock: ec0.s$(DRV_ID).ONE.0

softlimits:
  enable: no
  backwardEnable: yes
  forwardEnable: yes
  forward: 10
  backward: -10

monitoring:
  lag:
    enable: no
    tolerance: 0.1
    time: 100
  target:
    enable: yes
    tolerance: 0.01
    time: 100
  velocity:
    enable: no
    max: 50
    time:
      trajectory: 100
      drive: 200
